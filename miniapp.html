<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PolStock — Indonesia Political Market Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
<iframe id="dashboard" src="/?tg_miniapp=1" allow="clipboard-write"></iframe>
<script>
  (function() {
    const tg = window.Telegram?.WebApp;
    if (!tg) return; // not inside Telegram

    // Signal Telegram that the app is ready
    tg.ready();
    tg.expand();

    const iframe = document.getElementById('dashboard');

    function sendInit() {
      if (!iframe.contentWindow) return;
      iframe.contentWindow.postMessage({
        type: 'tg_init',
        user: tg.initDataUnsafe?.user || null,
        startParam: tg.initDataUnsafe?.start_param || null,
        colorScheme: tg.colorScheme,
        themeParams: tg.themeParams,
        initData: tg.initData,
      }, '*');
    }

    // Send init once iframe loads
    iframe.addEventListener('load', sendInit);

    // Re-send on theme change (user switches dark/light in Telegram)
    tg.onEvent('themeChanged', () => {
      sendInit();
    });

    // Close the app when user taps back
    tg.BackButton.show();
    tg.BackButton.onClick(() => tg.close());
  })();
</script>
</body>
</html>
